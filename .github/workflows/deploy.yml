name: CI/CD Deploy

on:
  push:
    branches:
      - main  # Trigger when you push to main branch

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the workflow repository (required by GitHub Actions)
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Copy SSH key and connect to VPS
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Pulling latest code and restarting Docker..."
            # Go inside the Git repo
            cd ~/docker/projects/ddustart/d_dust_art
            git pull origin main

            # Go back to the docker-compose folder
            cd ~/docker/projects/ddustart
            docker compose down
            docker compose up -d --build
